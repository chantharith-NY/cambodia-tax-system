  postgres:
    image: postgres:17-alpine

    container_name: tax-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: cambodia_tax_db
      POSTGRES_USER: tax_admin
      POSTGRES_PASSWORD: tax_admin_password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - tax-network

  pgadmin:
    image: dpage/pgadmin4

    container_name: tax-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - tax-network

volumes:
  postgres_data:

networks:
  tax-network: